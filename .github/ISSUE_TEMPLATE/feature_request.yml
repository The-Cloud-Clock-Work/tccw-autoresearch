name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - CLI / UX
        - Engine / Core Loop
        - Agent Profiles
        - Metrics / Confidence
        - Auto-merge / Gates
        - Documentation
        - Other
