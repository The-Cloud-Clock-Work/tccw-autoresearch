markers:
  - name: test-suite-health
    description: "Improve test coverage and reduce test runtime"
    status: active
    target:
      mutable:
        - tests/test_daemon.py
        - tests/test_utils.py
        - tests/test_engine.py
        - tests/test_cli.py
      immutable:
        - src/autoresearch/daemon.py
        - src/autoresearch/engine.py
        - src/autoresearch/cli.py
    metric:
      command: "python3 -m pytest --tb=no -q 2>&1 | tail -1"
      extract: '(\d+) passed'
      direction: higher
      baseline: 251
    guard:
      command: "python3 -m pytest --tb=short -q 2>&1"
      extract: '(\d+) passed'
      threshold: 251
      rework_attempts: 2
    loop:
      model: sonnet
      budget_per_experiment: 5m
      max_experiments: 10
    schedule:
      type: on-demand
